protocol_source: https://github.com/muhammad-zainal-muttaqin/YOLOBench/blob/main/E0_Protocol_Flowchart.html
dataset_label_semantics:
  maturity_order:
  - B1
  - B2
  - B3
  - B4
  direction: most_mature_to_least_mature
  B1: buah merah, besar, bulat, posisi paling bawah tandan; paling matang / ripe
  B2: buah masih hitam namun mulai transisi ke merah, sudah besar dan bulat, posisi
    di atas B1
  B3: buah full hitam, masih berduri, masih lonjong, posisi di atas B2
  B4: buah paling kecil, paling dalam di batang/tandan, sulit terlihat, masih banyak
    duri, hitam sampai hijau, masih bisa berkembang lebih besar; paling mengkal /
    belum matang
phase0_locked:
  imgsz: 640
  split: tree-grouped class-stratified
phase1a_locked:
  pipeline: one-stage
phase1b_locked:
  lock_stage: phase2_final_model_locked
  architecture_finalists:
  - yolo11m.pt
  selected_model: yolo11m.pt
  selection_policy: single_best_only_for_phase2
  baseline:
    lr0: 0.001
    batch: 16
    patience: 10
    epochs: 30
    min_epochs: 30
    aug_profile: medium
  phase1b_gate_map50_pass: false
  phase1b_gate_override_continue: true
phase2_locked:
  selected_model: yolo11m.pt
  final_config:
    model: yolo11m.pt
    lr0: 0.001
    batch: 16
    imbalance_strategy: none
    ordinal_strategy: standard
    aug_profile: medium
    patience: 10
    epochs: 30
    min_epochs: 30
    imgsz: 640
phase3_locked:
  contract_version: 3
  selection_policy: multi_candidate_trainval_postfit_eval
  candidates:
  - yolo11m.pt
  - yolov8s.pt
  one_stage_config:
    lr0: 0.001
    batch: 16
    imbalance_strategy: none
    ordinal_strategy: standard
    aug_profile: medium
    imgsz: 640
    epochs: 30
    seed: 42
    primary_checkpoint: last
    secondary_checkpoint: null
    fixed_epochs: false
    eval_splits:
    - val
    - test
    train_split: trainval
    train_no_val: true
    eval_conf: 0.1
  two_stage_config:
    enabled: false
    seed: 42
    stage1:
      model: yolo11n.pt
      single_cls: true
      imgsz: 640
      epochs: 30
      batch: 16
      patience: 10
      min_epochs: 30
      lr0: 0.001
      aug_profile: medium
    stage2:
      model: yolo11n-cls.pt
      imgsz: 224
      epochs: 30
      batch: 128
      patience: 10
      min_epochs: 30
      eval_splits:
      - val
      - test
    end_to_end:
      detector_conf: 0.25
      eval_splits:
      - val
      - test
